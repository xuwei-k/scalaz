name: CI
on:
  pull_request:
  push:
  schedule:
  - cron: '0 7 * * *'
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        java:
        - 25.0.1
        - 25.0.2
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{matrix.java}}
        distribution: zulu
    - run: ./sbt -v
           "++ 3.x"
           "project coreJVM"
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile clean update
           compile
